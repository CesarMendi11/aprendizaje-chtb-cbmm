erp:
  name: "ERP Cuerpo de Bomberos Municipal de Machala"
  code: "cbmm"
  base_url: "http://177.234.239.116:8084"

semantic_aliases:
  RUC:
    - "identificación tributaria"
    - "identificacion tributaria"
    - "identificación fiscal"
    - "identificacion fiscal"
  Buscar:
    - "búsqueda"
    - "busqueda"
    - "ejecutar búsqueda"
    - "realizar búsqueda"

browser:
  headless: false
  slow_mo: 150
  viewport:
    width: 1366
    height: 768

login:
  url: "/login"
  username_env: "ERP_USERNAME"
  password_env: "ERP_PASSWORD"

  username_selector: "#username"
  password_selector: "#password"

  submit_role_name: "Iniciar sesión"
  submit_selector: null

  success_url_contains: "/admin/home"
  wait_until: "domcontentloaded"
  initial_wait_ms: 1000
  post_login_wait_ms: 3000

navigation:
  home_url: "/admin/home"
  home_wait_ms: 1500

exploration:
  allowed_routes:
    - "/admin/"

  blocked_routes:
    - "/admin/configuracion"
    - "/admin/usuarios"
    - "/admin/roles"
    - "/admin/permisos"

  start_modules: []

  max_depth: 2
  max_pages_total: 25
  page_wait_ms: 800

safety:
  # Regla principal: una acción desconocida no se ejecuta automáticamente.
  default_decision: "deny" # allow | review | deny

  allowed_event_categories:
    - "navigation_link"
    - "expand_menu"
    - "collapse_menu"
    - "activate_tab"
    - "open_readonly_view"
    - "open_modal"
    - "open_date_picker"
    - "close_modal"
    - "open_drawer"
    - "close_drawer"
    - "open_dropdown"
    - "close_dropdown"
    - "submit_search"
    - "change_pagination"

  review_event_categories:
    - "expand_row"
    - "unknown"

  forbidden_event_categories:
    - "mutative_action"

  dangerous_keywords:
    - "Guardar"
    - "Eliminar"
    - "Borrar"
    - "Crear"
    - "Nuevo"
    - "Nueva"
    - "Registrar"
    - "Editar"
    - "Modificar"
    - "Actualizar"
    - "Aprobar"
    - "Anular"
    - "Firmar"
    - "Emitir"
    - "Enviar"
    - "Reenviar"
    - "Procesar"
    - "Confirmar"
    - "Pagar"
    - "Finalizar"
    - "Publicar"
    - "Activar"
    - "Desactivar"

  # Estas palabras ayudan a clasificar, pero no reemplazan la política por categorías.
  safe_keywords:
    - "Ver"
    - "Buscar"
    - "Consultar"
    - "Detalle"
    - "Filtros"
    - "Cerrar"

state_detection:
  # La firma estructural identifica estados funcionales aunque cambien datos.
  visible_text_limit: 4000
  ignore_query_values: true
  ignore_table_row_count: true

  # El estado del menú global solo forma parte de la identidad en la pantalla
  # donde se exploran módulos. En rutas internas se ignora para que expandir o
  # contraer el sidebar no rompa la restauración del estado raíz.
  navigation_state_routes:
    - "/admin/home"

  # Angular puede completar tablas y controles después de terminar la ruta.
  # Se esperan dos firmas estructurales consecutivas antes de registrar o
  # comparar un estado.
  stability:
    enabled: true
    timeout_ms: 4000
    interval_ms: 250
    minimum_observation_ms: 500
    required_consecutive_samples: 2
  volatile_text_patterns:
    - "\\b[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}\\b"
    - "\\b\\d{4}-\\d{2}-\\d{2}\\b"
    - "\\b\\d{1,2}[/-]\\d{1,2}[/-]\\d{2,4}\\b"
    - "\\b\\d{1,2}:\\d{2}(?::\\d{2})?\\b"
    - "\\b[0-9a-f]{24,}\\b"
    - "\\b\\d{6,}\\b"
    - "historial de inicio de sesi[oó]n.*$"

extraction:
  max_visible_text_chars: 8000
  max_region_text_chars: 5000

  # Estrategias generales; un nuevo ERP puede reemplazarlas desde su perfil.
  regions:
    global_navigation:
      - "fuse-vertical-navigation"
      - "[role='navigation']"
      - "nav"
      - "aside"
      - "app-sidebar"
      - ".sidebar"
    header:
      - "header"
      - "[role='banner']"
      - "mat-toolbar"
      - ".app-header"
      - ".topbar"
    main_content:
      - "main"
      - "[role='main']"
      - "router-outlet + *"
      - "app-home"
    footer:
      - "footer"
      - "[role='contentinfo']"
    dialog:
      - "dialog"
      - "[role='dialog']"
      - "[role='alertdialog']"
      - "mat-dialog-container"
      - ".modal.show"
    volatile: []

  title_resolution:
    max_title_length: 120
    generic_document_titles:
      - "Dashboard"
      - "ERP"
      - "Inicio"
    route_titles:
      "/admin/home": "Dashboard"
  keep_table_headers: true
  keep_form_fields: true
  keep_buttons: true
  keep_links: true

output:
  raw_playwright_dir: "data/raw/playwright"
  html_dir: "data/raw/html"
  screenshots_dir: "data/raw/screenshots"
  marked_screenshots_dir: "data/raw/marked_screenshots"

  processed_structural_dir: "data/processed/structural"
  processed_semantic_dir: "data/processed/semantic"

  review_structural_dir: "data/review/structural"
  review_semantic_dir: "data/review/semantic"

  approved_neo4j_dir: "data/approved/neo4j"
  approved_chromadb_dir: "data/approved/chromadb"

  rejected_dir: "data/rejected"
  cache_dir: "data/cache"

crawl_mode:
  environment: "production" # production | staging | test
  strategy: "safe" # safe | interactive | test_full

browser_interaction:
  # Los menús de algunos ERP se animan o reconstruyen tras cada navegación.
  # Se reintenta sin usar force=True para conservar la seguridad de Playwright.
  click_timeout_ms: 3000
  click_attempts: 3
  retry_wait_ms: 500
  pre_click_wait_ms: 200
  scroll_into_view: true

state_replay:
  # Restaura el estado fuente antes de probar cada evento seguro.
  enabled: true
  page_wait_ms: 800
  step_wait_ms: 400
  click_timeout_ms: 3000
  verify_each_step: true
  restore_attempts: 2

ui_events:
  enabled: true
  min_candidate_score: 3
  event_wait_ms: 400
  click_timeout_ms: 3000
  skip_link_navigation: true
  # Profundidad 1: explora controles locales de cada pantalla raíz y registra
  # el estado resultante, sin encadenar todavía eventos dentro de ese estado.
  max_event_depth: 1
  home_navigation_enabled: true
  explore_local_route_roots: true
  recursive_state_exploration: true
  home_event_categories:
    - "expand_menu"
  local_event_categories:
    - "activate_tab"
    - "open_readonly_view"
    - "open_date_picker"
    - "open_modal"
    - "open_dropdown"
    - "change_pagination"
  restore_after_exploration: true
  capture_event_artifacts: true
  artifact_timeout_ms: 3000
  artifact_full_page: false

  allowed_event_types:
    - "click"

  candidate_limits:
    max_candidates_per_screen: 30
    max_events_per_state: 5
    max_text_length: 100

  # La auditoría conserva todos los candidatos, pero la ejecución usa un
  # presupuesto equilibrado para que tablas y menús repetidos no desplacen
  # controles locales relevantes.
  exploration_budget:
    exclude_global_navigation_outside_home: true
    category_limits:
      activate_tab: 3
      open_readonly_view: 2
      open_date_picker: 1
      open_modal: 2
      open_dropdown: 2
      submit_search: 0
      change_pagination: 1
      expand_menu: 0
    home_category_limits:
      expand_menu: 10

  click_candidates:
    include:
      - "a"
      - "button"
      - "[role='button']"
      - "[role='menuitem']"
      - "[role='tab']"
      - "[aria-expanded]"
      - "[onclick]"
      - "[tabindex]"
      - "[class*='menu']"
      - "[class*='nav']"
      - "[class*='sidebar']"
      - "[class*='collapse']"
      - "[class*='accordion']"
      - "custom-elements"

    exclude:
      - "input[type='submit']"
      - "button[type='submit']"

forms:
  enabled: false
  fill_mode: "disabled" # disabled | fixture_only | test_random
  allow_submit: false

  test_values:
    default_text: "PRUEBA"
    default_number: "1"
    default_date: "2026-01-01"
